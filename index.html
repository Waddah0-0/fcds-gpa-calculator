<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FCDS GPA Calculator & Academic Planner</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-base: #050508;
      --bg-surface: rgba(255, 255, 255, 0.03);
      --bg-surface-hover: rgba(255, 255, 255, 0.06);
      --border-color: rgba(255, 255, 255, 0.08);
      --border-glow: rgba(99, 102, 241, 0.4);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      
      --font-display: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;
      
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      
      --shadow-premium: 0 10px 40px -10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      --transition-spring: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--bg-base);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
      line-height: 1.5;
    }

    .bg-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
      top: -200px;
      right: -200px;
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
      animation: pulseGlow 10s ease-in-out infinite alternate;
    }
    
    .bg-glow-2 {
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(14, 165, 233, 0.08) 0%, transparent 70%);
      bottom: -150px;
      left: -150px;
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
      animation: pulseGlow 8s ease-in-out infinite alternate-reverse;
    }

    @keyframes pulseGlow {
      0% { transform: scale(1) translate(0, 0); opacity: 0.8; }
      100% { transform: scale(1.1) translate(-20px, 20px); opacity: 1; }
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
      width: 100%;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    header {
      margin-bottom: 1rem;
      text-align: left;
    }
    
    .brand {
      display: inline-block;
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(to right, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1rem;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 10px #10b981;
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 2rem;
      align-items: start;
    }

    @media (max-width: 1024px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 2rem;
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow-premium);
      transition: border-color var(--transition-smooth);
    }

    .panel:hover {
      border-color: rgba(255, 255, 255, 0.15);
    }

    .panel-title {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #fff;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    
    .input-group label {
      font-size: 0.875rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .premium-input, .premium-select {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 0.875rem 1rem;
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: 1rem;
      outline: none;
      transition: all var(--transition-smooth);
    }

    .premium-input:focus, .premium-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
      background: rgba(0, 0, 0, 0.4);
    }
    
    .premium-input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    .premium-select {
      appearance: none;
      cursor: pointer;
      padding-right: 2.5rem;
    }

    .select-icon {
      position: absolute;
      right: 1rem;
      pointer-events: none;
      color: var(--text-muted);
      transition: transform var(--transition-smooth);
    }

    .input-wrapper:hover .select-icon {
      color: var(--text-main);
    }

    .prev-data-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    
    @media (max-width: 600px) {
      .prev-data-grid {
        grid-template-columns: 1fr;
      }
    }

    .mode-toggle {
      display: flex;
      background: rgba(0,0,0,0.3);
      padding: 0.25rem;
      border-radius: var(--radius-sm);
      margin-bottom: 1rem;
      border: 1px solid var(--border-color);
    }

    .mode-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .mode-btn.active {
      background: var(--bg-surface-hover);
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .courses-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .course-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 1rem;
      align-items: center;
      background: rgba(0,0,0,0.15);
      border: 1px solid transparent;
      padding: 0.75rem 1rem;
      border-radius: var(--radius-md);
      transition: all var(--transition-smooth);
      animation: rowEntrance 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      transform-origin: top center;
    }

    .course-row:hover {
      background: rgba(255,255,255,0.02);
      border-color: rgba(255,255,255,0.05);
    }

    .course-row.removing {
      animation: rowExit 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes rowEntrance {
      from { opacity: 0; transform: translateY(-10px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes rowExit {
      from { opacity: 1; transform: scale(1); height: auto; padding-top: 0.75rem; padding-bottom: 0.75rem; margin-bottom: 0; }
      to { opacity: 0; transform: scale(0.95); height: 0; padding-top: 0; padding-bottom: 0; margin-bottom: -1rem; border-color: transparent; overflow: hidden; }
    }

    @media (max-width: 640px) {
      .course-row {
        grid-template-columns: 1fr 1fr;
        grid-template-areas: 
          "name name"
          "credits grade"
          "delete delete";
      }
      .course-row .input-wrapper:nth-child(1) { grid-area: name; }
      .course-row .input-wrapper:nth-child(2) { grid-area: credits; }
      .course-row .input-wrapper:nth-child(3) { grid-area: grade; }
      .course-row .delete-btn { grid-area: delete; justify-content: center; width: 100%; margin-top: 0.5rem; }
    }

    .delete-btn {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid transparent;
      color: var(--danger);
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition-spring);
    }

    .delete-btn:hover {
      background: var(--danger);
      color: #fff;
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }

    .add-btn {
      width: 100%;
      padding: 1rem;
      background: transparent;
      border: 1px dashed var(--border-color);
      border-radius: var(--radius-md);
      color: var(--text-muted);
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all var(--transition-spring);
      margin-top: 0.5rem;
    }

    .add-btn:hover {
      background: rgba(255,255,255,0.02);
      border-color: rgba(255,255,255,0.2);
      color: var(--text-main);
    }

    .add-btn:active {
      transform: scale(0.98);
    }

    .dashboard-panel {
      position: sticky;
      top: 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      background: linear-gradient(145deg, rgba(30, 30, 40, 0.6) 0%, rgba(15, 15, 20, 0.8) 100%);
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 20px 50px -10px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .gpa-card {
      text-align: center;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border-color);
    }

    .gpa-label {
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .gpa-value {
      font-family: var(--font-display);
      font-size: 4.5rem;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(to bottom right, #fff, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 4px 12px rgba(99, 102, 241, 0.2));
      font-variant-numeric: tabular-nums;
      display: inline-block;
      transition: transform 0.1s ease-out;
    }
    
    .gpa-value.update-pulse {
      animation: subtlePop 0.3s ease-out;
    }

    @keyframes subtlePop {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .stat-box {
      background: rgba(0,0,0,0.2);
      border-radius: var(--radius-md);
      padding: 1rem;
      border: 1px solid rgba(255,255,255,0.03);
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-value {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 600;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }

    .cgpa-card {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.15) 0%, rgba(99, 102, 241, 0.05) 100%);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: var(--radius-md);
      padding: 1.5rem;
      text-align: center;
      transition: all 0.5s ease;
      opacity: 0.5;
      filter: grayscale(1);
    }

    .cgpa-card.active {
      opacity: 1;
      filter: grayscale(0);
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.15);
    }

    .cgpa-value {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 700;
      color: #fff;
      margin-top: 0.5rem;
      font-variant-numeric: tabular-nums;
    }
    
    .fcds-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0;
      opacity: 0.5;
    }

  </style>
</head>
<body>

  <div class="bg-glow"></div>
  <div class="bg-glow-2"></div>

  <div class="container">
    <header>
      <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem;">
        <h1 class="brand" style="margin-bottom: 0;">GPA Calculator</h1>
        <div class="fcds-badge">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          FCDS Standard
        </div>
      </div>
    </header>

    <main class="dashboard-grid">
      
      <div class="input-section" style="display: flex; flex-direction: column; gap: 2rem;">
        
        <section class="panel" id="history-panel">
          <h2 class="panel-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Previous Record (Optional)
          </h2>
          
          <div class="mode-toggle">
            <button class="mode-btn active" data-mode="gpa">Enter Previous GPA</button>
            <button class="mode-btn" data-mode="points">Enter Previous Points</button>
          </div>

          <div class="prev-data-grid">
            <div class="input-group">
              <label id="prev-val-label" for="prev-val">Previous GPA</label>
              <input type="number" id="prev-val" class="premium-input" placeholder="e.g. 3.45" step="0.01" min="0" max="4">
            </div>
            <div class="input-group">
              <label for="prev-hours">Previous Completed Hours</label>
              <input type="number" id="prev-hours" class="premium-input" placeholder="e.g. 45" step="1" min="0">
            </div>
          </div>
        </section>

        <section class="panel" id="current-panel">
          <h2 class="panel-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            Current Semester
          </h2>
          
          <div class="courses-container" id="courses-list">
          </div>
          
          <button class="add-btn" id="add-course-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Course
          </button>
        </section>

      </div>

      <div class="panel dashboard-panel">
        
        <div class="gpa-card">
          <div class="gpa-label">Semester GPA</div>
          <div class="gpa-value" id="display-semester-gpa">0.0000</div>
        </div>

        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-label">Sem. Hours</div>
            <div class="stat-value" id="display-sem-hours">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Sem. Points</div>
            <div class="stat-value" id="display-sem-points">0.00</div>
          </div>
        </div>

        <div class="cgpa-card" id="cgpa-card">
          <div class="gpa-label" style="color: rgba(255,255,255,0.7);">Cumulative GPA</div>
          <div class="cgpa-value" id="display-cgpa">--</div>
        </div>

      </div>

    </main>
  </div>

  <script>
    const FCDS_GRADES = {
      'A': 4.000,
      'A-': 3.666,
      'B+': 3.333,
      'B': 3.000,
      'B-': 2.666,
      'C+': 2.333,
      'C': 2.000,
      'C-': 1.666,
      'D+': 1.333,
      'D': 1.000,
      'F': 0.000
    };

    let state = {
      prevMode: 'gpa',
      prevVal: null,
      prevHours: null,
      courses: [],
      nextId: 1,
      lastSemesterGPA: 0,
      lastCGPA: 0
    };

    const coursesListEl = document.getElementById('courses-list');
    const addCourseBtn = document.getElementById('add-course-btn');
    const prevValInput = document.getElementById('prev-val');
    const prevHoursInput = document.getElementById('prev-hours');
    const prevValLabel = document.getElementById('prev-val-label');
    const modeBtns = document.querySelectorAll('.mode-btn');
    
    const displaySemGpa = document.getElementById('display-semester-gpa');
    const displaySemHours = document.getElementById('display-sem-hours');
    const displaySemPoints = document.getElementById('display-sem-points');
    const displayCgpa = document.getElementById('display-cgpa');
    const cgpaCard = document.getElementById('cgpa-card');

    function animateValue(element, start, end, duration, decimals = 4) {
      if (start === end) {
        element.textContent = end.toFixed(decimals);
        return;
      }
      
      let startTimestamp = null;
      const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        
        const easeOut = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
        const current = start + (end - start) * easeOut;
        
        element.textContent = current.toFixed(decimals);
        
        if (progress < 1) {
          window.requestAnimationFrame(step);
        } else {
          element.textContent = end.toFixed(decimals);
        }
      };
      
      element.classList.remove('update-pulse');
      void element.offsetWidth;
      element.classList.add('update-pulse');
      
      window.requestAnimationFrame(step);
    }

    function calculate() {
      let semHours = 0;
      let semPoints = 0;

      state.courses.forEach(course => {
        const credits = parseFloat(course.credits) || 0;
        const gradeVal = FCDS_GRADES[course.grade] || 0;
        semHours += credits;
        semPoints += (credits * gradeVal);
      });

      const semesterGPA = semHours > 0 ? (semPoints / semHours) : 0;

      let hasPrevData = false;
      let prevPointsCalc = 0;
      const pHours = parseFloat(state.prevHours);
      const pVal = parseFloat(state.prevVal);

      if (!isNaN(pHours) && pHours > 0 && !isNaN(pVal) && pVal >= 0) {
        hasPrevData = true;
        if (state.prevMode === 'gpa') {
          prevPointsCalc = pVal * pHours;
        } else {
          prevPointsCalc = pVal;
        }
      }

      let cgpa = 0;
      if (hasPrevData || semHours > 0) {
        const totalHours = (hasPrevData ? pHours : 0) + semHours;
        const totalPoints = prevPointsCalc + semPoints;
        cgpa = totalHours > 0 ? (totalPoints / totalHours) : 0;
      }

      updateDashboard(semHours, semPoints, semesterGPA, cgpa, hasPrevData);
    }

    function updateDashboard(semHours, semPoints, semesterGPA, cgpa, hasPrevData) {
      displaySemHours.textContent = semHours;
      displaySemPoints.textContent = semPoints.toFixed(3);

      animateValue(displaySemGpa, state.lastSemesterGPA, semesterGPA, 600, 4);
      state.lastSemesterGPA = semesterGPA;

      if (hasPrevData) {
        cgpaCard.classList.add('active');
        animateValue(displayCgpa, state.lastCGPA || 0, cgpa, 600, 4);
        state.lastCGPA = cgpa;
      } else {
        cgpaCard.classList.remove('active');
        displayCgpa.textContent = '--';
        state.lastCGPA = 0;
      }
    }

    function renderCourses() {
      coursesListEl.innerHTML = '';
      state.courses.forEach(course => {
        const row = document.createElement('div');
        row.className = 'course-row';
        row.id = `course-${course.id}`;
        
        row.innerHTML = `
          <div class="input-wrapper">
            <input type="text" class="premium-input course-name" placeholder="Course Name (Optional)" value="${course.name}" data-id="${course.id}">
          </div>
          <div class="input-wrapper">
            <select class="premium-select course-credits" data-id="${course.id}">
              <option value="4" ${course.credits == 4 ? 'selected' : ''}>4 Cr</option>
              <option value="3" ${course.credits == 3 ? 'selected' : ''}>3 Cr</option>
              <option value="2" ${course.credits == 2 ? 'selected' : ''}>2 Cr</option>
            </select>
            <svg class="select-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="input-wrapper">
            <select class="premium-select course-grade" data-id="${course.id}">
              ${Object.keys(FCDS_GRADES).map(grade => `<option value="${grade}" ${course.grade === grade ? 'selected' : ''}>${grade}</option>`).join('')}
            </select>
            <svg class="select-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <button class="delete-btn" data-id="${course.id}" aria-label="Remove Course">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
          </button>
        `;
        coursesListEl.appendChild(row);
      });
      attachRowListeners();
    }

    function attachRowListeners() {
      document.querySelectorAll('.course-credits, .course-grade').forEach(el => {
        el.addEventListener('change', (e) => {
          const id = parseInt(e.target.dataset.id);
          const course = state.courses.find(c => c.id === id);
          if (e.target.classList.contains('course-credits')) course.credits = e.target.value;
          if (e.target.classList.contains('course-grade')) course.grade = e.target.value;
          calculate();
        });
      });

      document.querySelectorAll('.course-name').forEach(el => {
        el.addEventListener('input', (e) => {
          const id = parseInt(e.target.dataset.id);
          const course = state.courses.find(c => c.id === id);
          course.name = e.target.value;
        });
      });

      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = parseInt(e.currentTarget.dataset.id);
          const rowEl = document.getElementById(`course-${id}`);
          
          rowEl.classList.add('removing');
          
          setTimeout(() => {
            state.courses = state.courses.filter(c => c.id !== id);
            renderCourses();
            calculate();
          }, 300);
        });
      });
    }

    addCourseBtn.addEventListener('click', () => {
      state.courses.push({
        id: state.nextId++,
        name: '',
        credits: 3,
        grade: 'A'
      });
      renderCourses();
      calculate();
    });

    modeBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        modeBtns.forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        state.prevMode = e.target.dataset.mode;
        
        if (state.prevMode === 'gpa') {
          prevValLabel.textContent = 'Previous GPA';
          prevValInput.placeholder = 'e.g. 3.45';
          prevValInput.max = "4";
          prevValInput.step = "0.01";
        } else {
          prevValLabel.textContent = 'Previous Accumulated Points';
          prevValInput.placeholder = 'e.g. 154.5';
          prevValInput.removeAttribute('max');
          prevValInput.step = "0.001";
        }
        calculate();
      });
    });

    prevValInput.addEventListener('input', (e) => {
      state.prevVal = e.target.value;
      calculate();
    });

    prevHoursInput.addEventListener('input', (e) => {
      state.prevHours = e.target.value;
      calculate();
    });

    renderCourses();
    calculate();

  </script>
</body>
</html>
